<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Ingreso</title>

    <!-- Custom fonts for this template-->
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="../../css/login.css" rel="stylesheet">

</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <div class="login-header">
                <h1>Crear Cuenta</h1>
                <p>Comience a gestionar sus notas</p>
            </div>

            <form id="registerForm">

                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Juan Pérez">
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="nombre@empresa.com">
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese una contraseña">
                </div>

                <div class="input-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" placeholder="Repita la contraseña">
                </div>

                <button type="submit">
                    Registrarme
                </button>

            </form>

            <div class="links">
                <a href="login.html">Ya tengo una cuenta</a>
            </div>

        </div>

    </div>


       <script src="../../js/config.js"></script>
 <script src="../../js/register.js"></script>

</body>

</html>
