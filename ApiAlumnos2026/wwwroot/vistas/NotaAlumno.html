<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas Alumnos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body>


  <main>

    <div class="container mt-3">

      <section>
        <article>

          <h2>Notas de Alumnos</h2>


          <!-- Button trigger modal -->
          <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNotaAlumno">
            NUEVA NOTA
          </button>

          <!-- Modal crear tipo actiidad -->
          <div class="modal fade" id="modalNotaAlumno" tabindex="-1" aria-labelledby="exampleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h1 class="modal-title fs-5">NUEVA NOTA</h1>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                    onclick="LimpiarModal()"></button>
                </div>
                <div class="modal-body">
                  <form class="formNotaAlumno">
                    <input type="hidden" id="alumnoId" value="0" disabled />

                    <div class="mb-3">
                      <label for="alumnoNombre" class="form-label">Nombre del Alumno</label>
                      <input type="text" class="form-control input-requerido" id="alumnoNombre"
                        placeholder="Ingrese un nombre completo" style="text-transform: uppercase" />
                      <!-- <span class="error-texto" id="errorNombre">Campo obligatorio</span> -->
                    </div>

                    <div class="mb-3">
                      <label for="dni" class="form-label">DNI</label>
                      <input type="number" class="form-control input-requerido" id="dni" placeholder="Ingrese el DNI" />
                      <!-- <span class="error-texto" id="errorDni">Campo obligatorio</span> -->
                    </div>

                    <div class="mb-3">
                      <label for="nota" class="form-label">Nota</label>
                      <input type="number" class="form-control input-requerido" id="nota"
                        placeholder="Ingrese la Nota" />
                      <!-- <span class="error-texto" id="errorNota">Campo obligatorio</span> -->
                    </div>

                  </form>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    onclick="LimpiarModal()">Cancelar</button>
                  <button type="button" class="btn btn-primary" onclick="GuardarNota()">Guardar</button>
                </div>
              </div>
            </div>
          </div>


          <table class="table">
            <thead>
              <tr>
                <th scope="col">Alumno</th>
                <th scope="col">DNI</th>
                <th scope="col">Nota</th>
                <th scope="col"></th>
                <th scope="col"></th>
              </tr>
            </thead>
            <tbody id="tbody-alumnos-notas">

            </tbody>
          </table>


    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

          <script src="../js/notaAlumno.js"></script>
        </article>
      </section>

    </div>


  </main>

  <footer>
    <div class="container text-center">
      <p>&copy; 2026 Mi Sitio Web</p>
    </div>
  </footer>
</body>

</html>
